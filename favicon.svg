<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#2850E8"/>
  <!-- h: dois traços verticais + barra horizontal -->
  <rect x="5"  y="7"  width="3" height="18" fill="white"/>
  <rect x="5"  y="15" width="9" height="3"  fill="white"/>
  <rect x="11" y="7"  width="3" height="18" fill="white"/>
  <!-- f: barra vertical + dois traços horizontais -->
  <rect x="19" y="7"  width="3"  height="18" fill="white"/>
  <rect x="19" y="7"  width="9"  height="3"  fill="white"/>
  <rect x="19" y="14" width="7"  height="2.5" fill="white"/>
</svg>
